aid: meteomatics
name: Meteomatics
description: >
  Meteomatics is a Swiss weather technology company offering a REST and
  WebSocket Weather API that provides hyperlocal forecasts, historical weather
  data back to 1940, climate scenarios to 2100, marine conditions, and
  environmental parameters at up to 1km native resolution. The API exposes
  over 1,800 weather parameters across global, regional, oceanic, and AI-based
  models, supporting point, multi-location, route, and polygon queries with
  output in JSON, CSV, XML, PNG, GeoTIFF, and NetCDF formats.
